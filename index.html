<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Diary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4ecd8;
            font-family: 'Patrick Hand', cursive;
            color: #3b2f2f;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #fffaf0;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .entry {
            border-left: 3px solid #c2a878;
            padding-left: 15px;
            margin: 25px 0;
        }

        .date {
            font-size: 0.9rem;
            color: #8b6f47;
        }

        .title {
            font-size: 1.5rem;
            margin: 5px 0;
        }

        .content {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .divider {
            border-bottom: 1px dashed #d6c7a1;
            margin: 20px 0;
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📓 My Diary</h1>

    <div class="entry">
        <div class="date">April 1, 2026</div>
        <div class="title">First Entry</div>
        <div class="content">
            Test -- Product 1
        </div>
    </div>

    <div class="divider"></div>

    <div class="entry">
        <div class="date">March 31, 2026</div>
        <div class="title">Late Night Thoughts</div>
        <div class="content">
            Test -- Product 2
        </div>
    </div>

    <div class="divider"></div>

    <div class="entry">
        <div class="date">March 30, 2026</div>
        <div class="title">A Small Win</div>
        <div class="content">
            Test -- Product 3
        </div>
    </div>

    <footer>
        © 2026 My Diary
    </footer>
</div>

</body>
</html>
